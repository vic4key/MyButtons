name=MyButtons
version=1.0.0
author=Vic P.
maintainer=Vic P.
sentence=A simple Arduino/ESP32 button library for handling a list of buttons - configure once, trigger a debounced pressed event via callback, or check pressed states anytime.
paragraph=MyButtons provides an easy-to-use interface for managing multiple GPIO buttons with built-in debounce, edge detection, callback, and polling APIs. Supports up to 64 buttons via bitmask, both active-high (VCC) and active-low (GND) wiring. Works on AVR, ESP32, and any Arduino-compatible board.
