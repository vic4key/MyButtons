name=MyButtons
version=1.0.0
author=Vic P.
maintainer=Vic P.
sentence=A simple, debounced button management library for Arduino/ESP32 with callback & polling APIs.
paragraph=MyButtons provides an easy-to-use interface for managing multiple GPIO buttons with built-in debounce (30ms), edge detection, event queue, callback, and polling-style APIs. Supports up to 64 buttons via bitmask, both active-high (VCC) and active-low (GND) wiring. Minimal dependencies — works on AVR, ESP32, and any Arduino-compatible board.
